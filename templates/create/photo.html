{% extends 'base.html' %}
{% block title %}Загрузить фото - Aura Nexus{% endblock %}

{% block content %}
<div style="max-width: 700px;">
    <h1 style="margin-bottom: 1.5rem;">🖼️ Загрузить фото</h1>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="/create/photo" enctype="multipart/form-data">
                {% if channels %}
                <div class="form-group">
                    <label class="form-label">Опубликовать в</label>
                    <select name="channel_id" class="form-control">
                        <option value="">От своего имени</option>
                        {% for channel in channels %}
                        <option value="{{ channel.id }}" {% if channel_id_preselect == channel.id|string %}selected{% endif %}>📺 {{ channel.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label">Фотографии</label>
                    <div class="file-upload">
                        <input type="file" name="photos" accept="image/jpeg,image/png,image/gif,image/webp" multiple required>
                        <div class="file-upload-icon">🖼️</div>
                        <div class="file-upload-text">Нажмите или перетащите фото</div>
                        <div class="file-upload-hint">JPG, PNG, GIF, WebP до 20MB. Максимум 10 фото</div>
                        <div class="file-preview" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:1rem;justify-content:center;"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Заголовок</label>
                    <input type="text" name="title" class="form-control" placeholder="Заголовок (необязательно)">
                </div>

                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea name="content" class="form-control" placeholder="Описание... #хештеги"></textarea>
                </div>

                <div class="form-group">
                    <div class="nsfw-check">
                        <input type="checkbox" name="is_nsfw" id="nsfw-photo">
                        <label for="nsfw-photo">Этот контент содержит материалы 18+</label>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn">Опубликовать</button>
                    <a href="/" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
