{% extends 'base.html' %}
{% block title %}Создать пост - Aura Nexus{% endblock %}

{% block content %}
<div style="max-width: 700px;">
    <h1 style="margin-bottom: 1.5rem;">📝 Создать текстовый пост</h1>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="/create/post">
                {% if channels %}
                <div class="form-group">
                    <label class="form-label">Опубликовать в</label>
                    <select name="channel_id" class="form-control">
                        <option value="">От своего имени</option>
                        {% for channel in channels %}
                        <option value="{{ channel.id }}">📺 {{ channel.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label">Заголовок (необязательно)</label>
                    <input type="text" name="title" class="form-control" placeholder="Введите заголовок">
                </div>

                <div class="form-group">
                    <label class="form-label">Текст</label>
                    <textarea name="content" class="form-control" placeholder="О чём хотите рассказать? Используйте #хештеги" required style="min-height: 200px;"></textarea>
                    <span class="form-hint">Поддерживаются #хештеги</span>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn">Опубликовать</button>
                    <a href="/" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
