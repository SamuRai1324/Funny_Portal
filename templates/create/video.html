{% extends 'base.html' %}
{% block title %}Загрузить видео - Aura Nexus{% endblock %}

{% block content %}
<div style="max-width: 700px;">
    <h1 style="margin-bottom: 1.5rem;">📹 Загрузить видео</h1>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="/create/video" enctype="multipart/form-data">
                {% if channels %}
                <div class="form-group">
                    <label class="form-label">Опубликовать в</label>
                    <select name="channel_id" class="form-control">
                        <option value="">От своего имени</option>
                        {% for channel in channels %}
                        <option value="{{ channel.id }}">📺 {{ channel.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label">Видео</label>
                    <div class="file-upload">
                        <input type="file" name="video" accept="video/mp4,video/webm,video/quicktime" required>
                        <div class="file-upload-icon">📹</div>
                        <div class="file-upload-text">Нажмите или перетащите видео</div>
                        <div class="file-upload-hint">MP4, WebM, MOV до 100MB</div>
                        <div class="file-preview"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Название</label>
                    <input type="text" name="title" class="form-control" placeholder="Название видео">
                </div>

                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea name="content" class="form-control" placeholder="Описание видео... #хештеги"></textarea>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn">Загрузить</button>
                    <a href="/" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
