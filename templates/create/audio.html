{% extends 'base.html' %}
{% block title %}Загрузить аудио - Aura Nexus{% endblock %}

{% block content %}
<div style="max-width: 700px;">
    <h1 style="margin-bottom: 1.5rem;">🎵 Загрузить аудио</h1>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="/create/audio" enctype="multipart/form-data">
                {% if channels %}
                <div class="form-group">
                    <label class="form-label">Опубликовать в</label>
                    <select name="channel_id" class="form-control">
                        <option value="">От своего имени</option>
                        {% for channel in channels %}
                        <option value="{{ channel.id }}" {% if channel_id_preselect == channel.id|string %}selected{% endif %}>📺 {{ channel.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label">Аудиофайл</label>
                    <div class="file-upload">
                        <input type="file" name="audio" accept="audio/mpeg,audio/wav,audio/ogg" required>
                        <div class="file-upload-icon">🎵</div>
                        <div class="file-upload-text">Нажмите или перетащите аудио</div>
                        <div class="file-upload-hint">MP3, WAV, OGG до 30MB</div>
                        <div class="file-preview"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Название</label>
                    <input type="text" name="title" class="form-control" placeholder="Название трека">
                </div>

                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea name="content" class="form-control" placeholder="Описание... #хештеги"></textarea>
                </div>

                <div class="form-group">
                    <div class="nsfw-check">
                        <input type="checkbox" name="is_nsfw" id="nsfw-audio">
                        <label for="nsfw-audio">Этот контент содержит материалы 18+</label>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn">Загрузить</button>
                    <a href="/" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
