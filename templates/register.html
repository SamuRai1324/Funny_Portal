{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="form-box">
    <h1>Регистрация</h1>
    <form method="POST">
        <input type="text" name="username" placeholder="Логин ({{ USERNAME_MIN }}-{{ USERNAME_MAX }}, a-z 0-9 _)" required minlength="{{ USERNAME_MIN }}" maxlength="{{ USERNAME_MAX }}" pattern="[a-zA-Z0-9_]+">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Пароль ({{ PASSWORD_MIN }}-{{ PASSWORD_MAX }})" required minlength="{{ PASSWORD_MIN }}" maxlength="{{ PASSWORD_MAX }}">
        <input type="password" name="confirm_password" placeholder="Повторите пароль" required>
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p>Есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
</div>
{% endblock %}
